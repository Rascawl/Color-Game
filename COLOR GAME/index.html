<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Color Game</title>
</head>
<body>
    
    <div class = "container">
        <div id = "dice" class="dice">
            <div id = "die1" class="die">
                <div class="face red"></div>
                <div class="face yellow"></div>
                <div class="face green"></div>
                <div class="face blue"></div>
                <div class="face white"></div>
                <div class="face pink"></div>
            </div>
            <div id = "die2" class="die">
                <div class="face red"></div>
                <div class="face yellow"></div>
                <div class="face green"></div>
                <div class="face blue"></div>
                <div class="face white"></div>
                <div class="face pink"></div>
            </div>
        </div>
        
        <button id = "roll">Play</button>
    </div>
    <script src = "script.js"></script>
</body>
</html>
